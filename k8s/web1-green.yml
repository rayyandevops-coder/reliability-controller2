apiVersion: apps/v1
kind: Deployment
metadata:
  name: web2-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web2
      version: green
  template:
    metadata:
      labels:
        app: web2
        version: green
    spec:
      containers:
      - name: web2
        image: rayyandevopss/web2-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5002

        readinessProbe:
          httpGet:
            path: /
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /
            port: 5002
          initialDelaySeconds: 20
          periodSeconds: 10

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 10