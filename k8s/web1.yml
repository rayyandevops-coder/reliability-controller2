apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: web1

  template:
    metadata:
      labels:
        app: web1

    spec:
      containers:
      - name: web1
        image: rayyandevopss/web1-service:COMMIT_SHA

        ports:
        - containerPort: 5001

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: web1-service
spec:
  selector:
    app: web1
  ports:
    - port: 5001
      targetPort: 5001