apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web1
  template:
    metadata:
      labels:
        app: web1
    spec:
      containers:
      - name: web1
        image: rayyandevopss/web1-service:COMMIT_SHA
        imagePullPolicy: Always
        ports:
        - containerPort: 5001

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: web1-service
  namespace: prod
spec:
  type: NodePort
  selector:
    app: web1
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30001