apiVersion: apps/v1
kind: Deployment
metadata:
  name: web2
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web2
  template:
    metadata:
      labels:
        app: web2
    spec:
      containers:
      - name: web2
        image: rayyandevopss/web2-service:COMMIT_SHA
        imagePullPolicy: Always
        ports:
        - containerPort: 5002

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: web2-service
  namespace: prod
spec:
  type: NodePort
  selector:
    app: web2
  ports:
    - port: 5002
      targetPort: 5002
      nodePort: 30002