apiVersion: apps/v1
kind: Deployment
metadata:
  name: web2
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: web2

  template:
    metadata:
      labels:
        app: web2

    spec:
      containers:
      - name: web2
        image: rayyandevopss/web2-service:v1

        ports:
        - containerPort: 5002

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: web2-service
spec:
  selector:
    app: web2
  ports:
    - port: 5002
      targetPort: 5002