apiVersion: apps/v1
kind: Deployment
metadata:
  name: executer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: executer
  template:
    metadata:
      labels:
        app: executer
    spec:
      containers:
      - name: executer
        image: rayyandevopss/executer-service:latest
        ports:
        - containerPort: 5003