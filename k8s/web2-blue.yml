apiVersion: apps/v1
kind: Deployment
metadata:
  name: web2-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web2
      version: blue
  template:
    metadata:
      labels:
        app: web2
        version: blue
    spec:
      containers:
      - name: web2
        image: rayyandevopss/web2-service:OLD_VERSION
        imagePullPolicy: Always

        ports:
        - containerPort: 5002

        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 10

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 10