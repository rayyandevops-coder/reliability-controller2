apiVersion: apps/v1
kind: Deployment
metadata:
  name: executer
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: executer

  template:
    metadata:
      labels:
        app: executer

    spec:
      containers:
      - name: executer
        image: rayyandevopss/executer-service:COMMIT_SHA

        ports:
        - containerPort: 5003

        imagePullPolicy: Always

        env:
        - name: EXECUTION_MODE
          value: "kubernetes"

        volumeMounts:
        - name: kube-config
          mountPath: /root/.kube

        readinessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 10
          periodSeconds: 10

      volumes:
      - name: kube-config
        hostPath:
          path: /root/.kube

---
apiVersion: v1
kind: Service
metadata:
  name: executer-service
spec:
  selector:
    app: executer
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP