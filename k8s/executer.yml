apiVersion: apps/v1
kind: Deployment
metadata:
  name: executer
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: executer
  template:
    metadata:
      labels:
        app: executer
    spec:
      containers:
      - name: executer
        image: rayyandevopss/executer-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5003

        env:
        - name: EXECUTION_MODE
          value: "kubernetes"
        - name: SARATHI_URL
          value: "http://sarathi-service:5001/decision"

        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"
          limits:
            memory: "200Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: executer-service
spec:
  type: NodePort   # 🔥 ADD THIS
  selector:
    app: executer
  ports:
    - port: 5003
      targetPort: 5003
      nodePort: 30003 