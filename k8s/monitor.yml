apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: monitor

  template:
    metadata:
      labels:
        app: monitor

    spec:
      containers:
      - name: monitor
        image: rayyandevopss/monitor-service:COMMIT_SHA

        ports:
        - containerPort: 5004

        env:
        - name: ENV
          value: "DEV"

        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-service
spec:
  selector:
    app: monitor
  ports:
    - port: 5004
      targetPort: 5004
  type: ClusterIP