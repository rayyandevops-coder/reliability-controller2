apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
      - name: monitor
        image: rayyandevopss/monitor-service:COMMIT_SHA
        imagePullPolicy: Always
        ports:
        - containerPort: 5004

        env:
        - name: EXECUTER_URL
          value: "http://executer-service:5003"

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-service
  namespace: prod
spec:
  selector:
    app: monitor
  ports:
    - port: 5004
      targetPort: 5004