apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web1
      version: blue
  template:
    metadata:
      labels:
        app: web1
        version: blue
    spec:
      containers:
      - name: web1
        image: rayyandevopss/web1-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5001

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 10