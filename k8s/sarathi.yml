apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarathi
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sarathi
  template:
    metadata:
      labels:
        app: sarathi
    spec:
      containers:
      - name: sarathi
        image: rayyandevopss/sarathi-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5001

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: sarathi-service
spec:
  selector:
    app: sarathi
  ports:
    - port: 5001
      targetPort: 5001