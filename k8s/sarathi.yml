apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarathi
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: sarathi

  template:
    metadata:
      labels:
        app: sarathi

    spec:
      containers:
      - name: sarathi
        image: rayyandevopss/sarathi-service:v1

        ports:
        - containerPort: 5001

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: sarathi
spec:
  selector:
    app: sarathi
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP