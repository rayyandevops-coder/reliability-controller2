name: PRAVAH Full CI/CD + Blue-Green (FINAL FIXED)

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: v3

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # ==============================
    # 🔹 CHECKOUT
    # ==============================
    - uses: actions/checkout@v5

    # 🔹 TRACE ID
    - name: Generate Trace ID
      run: echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV

    # ==============================
    # 🔹 DOCKER LOGIN
    # ==============================
    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # ==============================
    # 🔥 BUILD & PUSH IMAGES
    # ==============================
    - name: Build & Push Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/monitor-service:$IMAGE_TAG ./monitor
        docker build -t ${{ secrets.DOCKER_USERNAME }}/executer-service:$IMAGE_TAG ./executer
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sarathi-service:$IMAGE_TAG ./sarathi
        docker build -t ${{ secrets.DOCKER_USERNAME }}/web1-service:$IMAGE_TAG ./web1
        docker build -t ${{ secrets.DOCKER_USERNAME }}/web2-service:$IMAGE_TAG ./web2

        docker push ${{ secrets.DOCKER_USERNAME }}/monitor-service:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/executer-service:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/sarathi-service:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/web1-service:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/web2-service:$IMAGE_TAG

    # ==============================
    # 🔹 KUBECTL SETUP
    # ==============================
    - uses: azure/setup-kubectl@v5

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # ==============================
    # 🔥 CREATE NAMESPACES
    # ==============================
    - name: Create Namespaces
      run: |
        kubectl create namespace prod || true
        kubectl create namespace staging || true

    # ==============================
    # 🚀 STAGING DEPLOY
    # ==============================
    - name: Deploy Staging
      run: |
        kubectl apply -f k8s/staging/ -n staging

    - name: Wait Staging
      run: |
        kubectl wait --for=condition=available deployment --all -n staging --timeout=180s

    # ==============================
    # 🚀 BASE PROD (BLUE)
    # ==============================
    - name: Deploy Base System (BLUE)
      run: |
        kubectl apply -f k8s/web1-blue.yml -n prod
        kubectl apply -f k8s/web2-blue.yml -n prod
        kubectl apply -f k8s/web1-service.yml -n prod
        kubectl apply -f k8s/web2-service.yml -n prod
        kubectl apply -f k8s/monitor.yml -n prod
        kubectl apply -f k8s/executer.yml -n prod
        kubectl apply -f k8s/sarathi.yml -n prod

    - name: Wait Base System
      run: |
        kubectl wait --for=condition=available deployment --all -n prod --timeout=180s

    # ==============================
    # 🟢 DEPLOY GREEN
    # ==============================
    - name: Deploy Green
      run: |
        kubectl apply -f k8s/web1-green.yml -n prod
        kubectl apply -f k8s/web2-green.yml -n prod

    - name: Wait Green Ready
      run: |
        kubectl rollout status deployment/web1-green -n prod
        kubectl rollout status deployment/web2-green -n prod

    # ==============================
    # 🔄 SWITCH TRAFFIC
    # ==============================
    - name: Switch Traffic to Green
      run: |
        kubectl patch service web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"green"}}}'
        kubectl patch service web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"green"}}}'

    # ==============================
    # 🔍 VERIFY
    # ==============================
    - name: Verify Deployment
      run: |
        kubectl get pods -n prod
        kubectl get svc -n prod

    # ==============================
    # 🔥 PRAVAH TEST
    # ==============================
    - name: Emit Signal
      run: |
        POD=test-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":850,\"error_rate\":0.6}" \
          > output.json

        echo "=== SIGNAL OUTPUT ==="
        cat output.json

        kubectl delete pod $POD

    # ==============================
    # 🔹 LOGS
    # ==============================
    - name: Fetch Logs
      run: |
        kubectl logs -n prod deploy/monitor | tail -n 20

    # ==============================
    # 🔹 FINAL TRACE
    # ==============================
    - name: Final Trace
      run: |
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"flow\": [
            \"docker_build\",
            \"docker_push\",
            \"staging_deploy\",
            \"blue_deploy\",
            \"green_deploy\",
            \"traffic_switch\",
            \"signals_verified\"
          ],
          \"status\":\"production_ready\"
        }"