name: PRAVAH Staging + Blue-Green Deploy (FINAL)

on:
  push:
    branches:
      - main

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - uses: actions/checkout@v5

    # 🔹 Generate Trace ID
    - name: Generate Trace ID
      run: echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV

    # 🔹 Setup kubectl
    - uses: azure/setup-kubectl@v5

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # 🔥 Create Namespace
    - name: Create Namespace
      run: kubectl create namespace prod || true

    # =========================================
    # 🚀 STAGING DEPLOY
    # =========================================
    - name: Deploy to Staging
      run: |
        kubectl apply -f k8s/staging/ -n prod

    - name: Wait for Staging
      run: |
        kubectl wait --for=condition=available deployment --all -n prod --timeout=180s

    # =========================================
    # 🟢 DEPLOY GREEN VERSION
    # =========================================
    - name: Deploy Green Version
      run: |
        kubectl apply -f k8s/web1-green.yml -n prod
        kubectl apply -f k8s/web2-green.yml -n prod

    - name: Wait for Green Pods
      run: |
        kubectl rollout status deployment/web1-green -n prod
        kubectl rollout status deployment/web2-green -n prod

    # =========================================
    # 🔄 SWITCH TRAFFIC (BLUE → GREEN)
    # =========================================
    - name: Switch Traffic to Green
      run: |
        kubectl patch service web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"green"}}}'
        kubectl patch service web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"green"}}}'

    # =========================================
    # 🔍 VERIFY SWITCH
    # =========================================
    - name: Verify Service Routing
      run: |
        kubectl get svc -n prod
        kubectl describe svc web1-service -n prod | grep Selector
        kubectl describe svc web2-service -n prod | grep Selector

    # =========================================
    # 🔥 PRAVAH SIGNAL EXECUTION
    # =========================================
    - name: Emit Signals
      run: |
        POD=test-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":850,\"error_rate\":0.6}"

        kubectl delete pod $POD

    # =========================================
    # 🔹 LOGS
    # =========================================
    - name: Fetch Logs
      run: |
        kubectl logs -n prod deploy/monitor | tail -n 20

    # =========================================
    # 🔹 FINAL TRACE
    # =========================================
    - name: Final Trace
      run: |
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"flow\": [
            \"staging_deployed\",
            \"green_deployed\",
            \"traffic_switched\",
            \"signals_emitted\"
          ],
          \"strategy\":\"blue_green\"
        }"