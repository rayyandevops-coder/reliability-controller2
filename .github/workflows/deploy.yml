name: CI-CD Pipeline (BHIV FINAL - STABLE & COMPLETE)

on:
  push:
    branches:
      - main

env:
  IMAGE_PREFIX: rayyandevopss

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - uses: actions/checkout@v4

    # 🔹 Trace IDs
    - name: Generate Trace IDs
      run: |
        echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV
        echo "EXECUTION_ID=$(date +%s)" >> $GITHUB_ENV
        echo "DEPLOYMENT_ID=${GITHUB_SHA}" >> $GITHUB_ENV

    # 🔹 Governance Gate
    - name: Governance Gate
      run: |
        if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
          echo "BLOCKED: Only main branch allowed"
          exit 1
        fi

    # 🔹 Log Start
    - name: Log Start
      run: |
        echo "{\"trace_id\":\"$TRACE_ID\",\"event\":\"deployment_start\"}"

    # 🔹 Docker Login
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Tag
    - name: Set Tag
      run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    # 🔹 Build & Push
    - name: Build & Push Images
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:$TAG ./web1
        docker build -t $IMAGE_PREFIX/web2-service:$TAG ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:$TAG ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:$TAG ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:$TAG ./monitor

        docker push $IMAGE_PREFIX/web1-service:$TAG
        docker push $IMAGE_PREFIX/web2-service:$TAG
        docker push $IMAGE_PREFIX/sarathi-service:$TAG
        docker push $IMAGE_PREFIX/executer-service:$TAG
        docker push $IMAGE_PREFIX/monitor-service:$TAG

    # 🔹 Kubectl Setup
    - uses: azure/setup-kubectl@v4

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

        kubectl config set-cluster kubernetes \
          --server=https://54.156.236.10:6443 \
          --insecure-skip-tls-verify=true

    # 🔹 Deploy STAGING
    - name: Deploy to STAGING
      run: |
        kubectl create namespace staging || true

        kubectl apply -f k8s/web1-blue.yml -n staging
        kubectl apply -f k8s/web2-blue.yml -n staging
        kubectl apply -f k8s/sarathi.yml -n staging
        kubectl apply -f k8s/executer.yml -n staging
        kubectl apply -f k8s/monitor.yml -n staging

    # 🔹 Wait STAGING
    - name: Verify STAGING
      run: |
        set -e
        kubectl rollout status deployment/web1-blue -n staging --timeout=300s
        kubectl rollout status deployment/web2-blue -n staging --timeout=300s
        kubectl rollout status deployment/sarathi -n staging --timeout=300s
        kubectl rollout status deployment/executer -n staging --timeout=300s
        kubectl rollout status deployment/monitor -n staging --timeout=300s

    # 🔹 Deploy PROD
    - name: Deploy to PROD
      run: |
        kubectl create namespace prod || true
        kubectl apply -f k8s/ -n prod

    # 🔹 Wait PROD
    - name: Wait for PROD Deployments
      run: |
        set -e
        kubectl rollout status deployment/web1-blue -n prod --timeout=300s
        kubectl rollout status deployment/web2-blue -n prod --timeout=300s
        kubectl rollout status deployment/sarathi -n prod --timeout=300s
        kubectl rollout status deployment/executer -n prod --timeout=300s
        kubectl rollout status deployment/monitor -n prod --timeout=300s

    # 🔥 SARATHI DECISION
    - name: Sarathi Decision Gate
      run: |
        echo "Waiting for Sarathi..."
        kubectl wait --for=condition=available deployment/sarathi -n prod --timeout=120s

        kubectl port-forward svc/sarathi-service 5001:5001 -n prod > /dev/null 2>&1 &
        PF_PID=$!

        sleep 5

        RESPONSE=$(curl -s -X POST http://localhost:5001/decision \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"action_type\":\"deployment\",\"payload\":{\"decision_score\":0.8}}")

        echo "Sarathi Response: $RESPONSE"

        STATUS=$(echo $RESPONSE | jq -r '.status')

        kill $PF_PID

        if [ "$STATUS" != "ALLOW" ]; then
          echo "❌ BLOCKED BY SARATHI"
          exit 1
        fi

    # 🔥 EXECUTER CALL
    - name: Notify Executer
      run: |
        echo "Waiting for Executer..."
        kubectl wait --for=condition=available deployment/executer -n prod --timeout=120s

        kubectl port-forward svc/executer-service 5003:5003 -n prod > /dev/null 2>&1 &
        PF_PID=$!

        sleep 5

        curl -X POST http://localhost:5003/execute-action \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"service_id\":\"web1\",\"action\":\"scale_up\",\"decision\":\"ALLOW\"}"

        kill $PF_PID

    # 🔹 Health Check
    - name: Health Check
      run: |
        kubectl run curl-test --restart=Never \
          --image=curlimages/curl -- \
          curl -f http://web1-service:5001/health

        kubectl wait --for=condition=Ready pod/curl-test --timeout=30s || true
        kubectl delete pod curl-test || true

    # 🔹 Switch Traffic
    - name: Switch Traffic
      run: |
        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"green"}}}'
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"green"}}}'

    # 🔹 Metrics
    - name: Collect Metrics
      run: |
        LATENCY=$(kubectl run tmp --restart=Never \
          --image=curlimages/curl -- \
          curl -o /dev/null -s -w '%{time_total}' http://web1-service:5001/health)

        echo "{\"trace_id\":\"$TRACE_ID\",\"latency\":$LATENCY}"

        kubectl delete pod tmp || true

    # 🔹 Success
    - name: Success Log
      if: success()
      run: |
        echo "{\"trace_id\":\"$TRACE_ID\",\"status\":\"success\"}"

    # 🔹 Rollback
    - name: Rollback
      if: failure()
      run: |
        kubectl rollout undo deployment/web1-blue -n prod || true
        kubectl rollout undo deployment/web2-blue -n prod || true

        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"blue"}}}' || true
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"blue"}}}' || true

    # 🔹 Failure Log
    - name: Failure Log
      if: failure()
      run: |
        echo "{\"trace_id\":\"$TRACE_ID\",\"status\":\"rollback\"}"

    # 🔹 Final Output
    - name: Final Output
      if: always()
      run: |
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"deployment_type\":\"blue-green\"
        }"