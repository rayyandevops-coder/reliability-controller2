name: CI-CD Pipeline (BHIV FINAL - STABLE)

on:
  push:
    branches:
      - main

env:
  IMAGE_PREFIX: rayyandevopss

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - uses: actions/checkout@v4

    # 🔹 Trace IDs
    - name: Generate Trace IDs
      run: |
        echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV
        echo "EXECUTION_ID=$(date +%s)" >> $GITHUB_ENV
        echo "DEPLOYMENT_ID=${GITHUB_SHA}" >> $GITHUB_ENV

    # 🔹 Governance Gate
    - name: Governance Gate
      run: |
        if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
          echo "BLOCKED"
          exit 1
        fi

    # 🔹 Docker Login
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build & Push
    - name: Build & Push Images
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:$GITHUB_SHA ./web1
        docker build -t $IMAGE_PREFIX/web2-service:$GITHUB_SHA ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:$GITHUB_SHA ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:$GITHUB_SHA ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:$GITHUB_SHA ./monitor

        docker push $IMAGE_PREFIX/web1-service:$GITHUB_SHA
        docker push $IMAGE_PREFIX/web2-service:$GITHUB_SHA
        docker push $IMAGE_PREFIX/sarathi-service:$GITHUB_SHA
        docker push $IMAGE_PREFIX/executer-service:$GITHUB_SHA
        docker push $IMAGE_PREFIX/monitor-service:$GITHUB_SHA

    # 🔹 Kubectl Setup
    - uses: azure/setup-kubectl@v4

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # 🔹 Deploy
    - name: Deploy to PROD
      run: |
        kubectl create namespace prod || true
        kubectl apply -f k8s/ -n prod

    # 🔹 Wait
    - name: Wait for Deployments
      run: |
        kubectl rollout status deployment/sarathi -n prod
        kubectl rollout status deployment/executer -n prod
        kubectl rollout status deployment/web1-blue -n prod
        kubectl rollout status deployment/web2-blue -n prod

    # 🔥 SARATHI CALL
    - name: Sarathi Decision
      run: |
        kubectl run curl-sarathi \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 5

        kubectl wait --for=condition=Ready pod/curl-sarathi --timeout=60s

        kubectl exec curl-sarathi -- curl -s -X POST http://sarathi-service.prod.svc.cluster.local:5001/decision \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"action_type\":\"deployment\",\"payload\":{\"decision_score\":0.8}}" > response.json

        cat response.json

        STATUS=$(jq -r '.status' response.json)

        kubectl delete pod curl-sarathi

        if [ "$STATUS" != "ALLOW" ]; then
          echo "BLOCKED"
          exit 1
        fi

    # 🔥 EXECUTER CALL
    - name: Executer Call
      run: |
        kubectl run curl-exec \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 5

        kubectl wait --for=condition=Ready pod/curl-exec --timeout=60s

        kubectl exec curl-exec -- curl -X POST http://executer-service.prod.svc.cluster.local:5003/execute-action \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"service_id\":\"web1\",\"action\":\"scale_up\",\"decision\":\"ALLOW\"}"

        kubectl delete pod curl-exec

    # 🔹 Health Check
    - name: Health Check
      run: |
        kubectl run curl-test \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 5

        kubectl wait --for=condition=Ready pod/curl-test --timeout=60s

        kubectl exec curl-test -- curl -f http://web1-service.prod.svc.cluster.local:5001/health

        kubectl delete pod curl-test

    # 🔹 Success
    - name: Success
      run: echo "Deployment Successful"