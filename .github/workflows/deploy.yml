name: PRAVAH Full Deploy + Signal Pipeline (10/10)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - uses: actions/checkout@v5

    # 🔹 Generate Trace ID
    - name: Generate Trace ID
      run: |
        echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV

    # 🔹 Setup kubectl
    - uses: azure/setup-kubectl@v5

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # 🔥 CREATE NAMESPACE (SAFE)
    - name: Create Namespace
      run: |
        kubectl create namespace prod || true

    # 🔥 DEPLOY ALL SERVICES (FRESH SETUP)
    - name: Deploy System
      run: |
        kubectl apply -f executer.yml -n prod
        kubectl apply -f monitor.yml -n prod
        kubectl apply -f sarathi.yml -n prod
        kubectl apply -f web1-blue.yml -n prod
        kubectl apply -f web2-blue.yml -n prod
        kubectl apply -f web1-service.yml -n prod

    # 🔥 WAIT FOR SYSTEM TO BE READY
    - name: Wait for Pods
      run: |
        kubectl wait --for=condition=available deployment --all -n prod --timeout=180s

    # 🔹 Verify Deployment
    - name: Verify Pods
      run: |
        kubectl get pods -n prod

    # 🔥 METRICS COLLECTION
    - name: Collect Metrics
      run: |
        POD=metrics-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s http://monitor-service.prod.svc.cluster.local:5004/metrics \
          > metrics.json

        echo "=== METRICS ==="
        cat metrics.json

        kubectl delete pod $POD

    # 🔥 SIGNAL NORMAL
    - name: Emit Signal Normal
      run: |
        POD=signal-normal-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":200,\"error_rate\":0.1}" \
          > normal.json

        echo "=== NORMAL SIGNAL ==="
        cat normal.json

        kubectl delete pod $POD

    # 🔥 SIGNAL FAILURE
    - name: Emit Signal Failure
      run: |
        POD=signal-fail-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":850,\"error_rate\":0.6}" \
          > failure.json

        echo "=== FAILURE SIGNAL ==="
        cat failure.json

        kubectl delete pod $POD

    # 🔥 VALIDATE SIGNAL STRUCTURE
    - name: Validate Signal Output
      run: |
        echo "=== VALIDATED SIGNAL ==="
        cat failure.json | jq

    # 🔥 INVALID SIGNAL TEST
    - name: Invalid Signal Test
      run: |
        POD=invalid-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\"}" \
          > invalid.json

        echo "=== INVALID SIGNAL RESPONSE ==="
        cat invalid.json

        kubectl delete pod $POD

    # 🔹 Logs Proof
    - name: Fetch Logs
      run: |
        kubectl logs -n prod deploy/monitor | tail -n 20

    # 🔹 FINAL TRACE
    - name: Final Trace
      run: |
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"flow\": [
            \"infra_deployed\",
            \"metrics_collected\",
            \"signals_generated\",
            \"validated\",
            \"invalid_rejected\"
          ],
          \"system\":\"pravah\",
          \"mode\":\"fresh_deploy\"
        }"