name: CI-CD Pipeline (Zero Downtime)

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: rayyandevopss

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Get code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build & Push Images
    - name: Build and Push Images
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:${{ github.sha }} ./web1
        docker build -t $IMAGE_PREFIX/web2-service:${{ github.sha }} ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:${{ github.sha }} ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:${{ github.sha }} ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:${{ github.sha }} ./monitor

        docker push $IMAGE_PREFIX/web1-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/web2-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/sarathi-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/executer-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/monitor-service:${{ github.sha }}

    # 4. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    # 5. Configure Kubeconfig
    - name: Configure Kubernetes Access
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig

    # 6. Update image tags in YAML
    - name: Replace Image Tags
      run: |
        sed -i "s/COMMIT_SHA/${{ github.sha }}/g" k8s/*.yml

    # 7. Apply Kubernetes manifests
    - name: Deploy to Kubernetes
      run: |
        export KUBECONFIG=$PWD/kubeconfig
        kubectl apply -f k8s/

    # 8. Wait for rollout (CRITICAL)
    - name: Verify Rollout
      run: |
        export KUBECONFIG=$PWD/kubeconfig
        kubectl rollout status deployment/web1
        kubectl rollout status deployment/web2
        kubectl rollout status deployment/sarathi
        kubectl rollout status deployment/executer
        kubectl rollout status deployment/monitor

    # 9. Auto rollback if failed
    - name: Rollback on Failure
      if: failure()
      run: |
        export KUBECONFIG=$PWD/kubeconfig
        kubectl rollout undo deployment/web1
        kubectl rollout undo deployment/web2
        kubectl rollout undo deployment/sarathi
        kubectl rollout undo deployment/executer
        kubectl rollout undo deployment/monitor