name: PRAVAH Signal Pipeline (TANTRA Compliant)

on:
  push:
    branches:
      - main

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout Repo
    - uses: actions/checkout@v4

    # 🔹 Generate Trace ID (GLOBAL)
    - name: Generate Trace ID
      run: |
        echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV

    # 🔹 Setup kubectl
    - uses: azure/setup-kubectl@v4

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # ─────────────────────────────────────────────
    # 🔥 METRICS COLLECTION (OBSERVE ONLY)
    # ─────────────────────────────────────────────
    - name: Collect Metrics from Pravah
      run: |
        POD=pravah-metrics-$TRACE_ID

        kubectl run $POD \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 10

        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s http://monitor-service.prod.svc.cluster.local:5004/metrics \
          > metrics.json

        echo "Collected Metrics:"
        cat metrics.json

        kubectl delete pod $POD

    # ─────────────────────────────────────────────
    # 🔥 SIGNAL EMISSION — NORMAL CASE
    # ─────────────────────────────────────────────
    - name: Emit Pravah Signal (Normal)
      run: |
        POD=pravah-normal-$TRACE_ID

        kubectl run $POD \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 10

        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":200,\"error_rate\":0.1,\"deployment_status\":\"success\"}" \
          > normal_signal.json

        echo "Normal Signal:"
        cat normal_signal.json

        kubectl delete pod $POD

    # ─────────────────────────────────────────────
    # 🔥 SIGNAL EMISSION — FAILURE CASE
    # ─────────────────────────────────────────────
    - name: Emit Pravah Signal (Failure)
      run: |
        POD=pravah-failure-$TRACE_ID

        kubectl run $POD \
          --image=curlimages/curl \
          --restart=Never \
          --command -- sleep 10

        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":850,\"error_rate\":0.2,\"deployment_status\":\"failed\"}" \
          > failure_signal.json

        echo "Failure Signal:"
        cat failure_signal.json

        kubectl delete pod $POD

    # ─────────────────────────────────────────────
    # 🔹 FINAL TRACE OUTPUT (MANDATORY PROOF)
    # ─────────────────────────────────────────────
    - name: Final Trace Output
      if: always()
      run: |
        echo "===== FINAL TRACE ====="
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"stages\": [
            \"metrics_collected\",
            \"signal_emitted_normal\",
            \"signal_emitted_failure\"
          ],
          \"system\": \"pravah\"
        }"