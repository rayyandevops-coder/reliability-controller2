name: PRAVAH Signal Pipeline (FINAL)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - uses: actions/checkout@v5

    # 🔹 Trace ID
    - name: Generate Trace ID
      run: |
        echo "TRACE_ID=$(uuidgen)" >> $GITHUB_ENV

    # 🔹 Setup kubectl
    - uses: azure/setup-kubectl@v5

    # 🔹 Configure kubeconfig
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # 🔹 Verify System Running (PROOF)
    - name: Verify Pods
      run: |
        kubectl get pods -n prod

    # 🔥 METRICS COLLECTION
    - name: Collect Metrics
      run: |
        POD=metrics-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s http://monitor-service.prod.svc.cluster.local:5004/metrics \
          > metrics.json

        echo "=== METRICS ==="
        cat metrics.json

        kubectl delete pod $POD

    # 🔥 SIGNAL NORMAL
    - name: Emit Signal Normal
      run: |
        POD=signal-normal-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":200,\"error_rate\":0.1,\"deployment_status\":\"success\"}" \
          > normal.json

        echo "=== NORMAL SIGNAL ==="
        cat normal.json

        kubectl delete pod $POD

    # 🔥 SIGNAL FAILURE
    - name: Emit Signal Failure
      run: |
        POD=signal-fail-$TRACE_ID
        kubectl run $POD --image=curlimages/curl --restart=Never --command -- sleep 10
        kubectl wait --for=condition=Ready pod/$POD --timeout=60s

        kubectl exec $POD -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d "{\"trace_id\":\"$TRACE_ID\",\"latency\":850,\"error_rate\":0.2,\"deployment_status\":\"failed\"}" \
          > failure.json

        echo "=== FAILURE SIGNAL ==="
        cat failure.json

        kubectl delete pod $POD

    # 🔹 Fetch Logs (PROOF)
    - name: Fetch Pravah Logs
      run: |
        kubectl logs -n prod deploy/monitor | tail -n 20

    # 🔹 FINAL TRACE
    - name: Final Trace
      run: |
        echo "{
          \"trace_id\":\"$TRACE_ID\",
          \"flow\": [
            \"metrics_collected\",
            \"signal_normal\",
            \"signal_failure\"
          ],
          \"system\":\"pravah\"
        }"