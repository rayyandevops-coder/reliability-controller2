name: CI-CD Pipeline (FINAL CLEAN)

on:
  push:
    branches:
      - main

env:
  IMAGE_PREFIX: rayyandevopss

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build images
    - name: Build & Push
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:latest ./web1
        docker build -t $IMAGE_PREFIX/web2-service:latest ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:latest ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:latest ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:latest ./monitor

        docker push $IMAGE_PREFIX/web1-service:latest
        docker push $IMAGE_PREFIX/web2-service:latest
        docker push $IMAGE_PREFIX/sarathi-service:latest
        docker push $IMAGE_PREFIX/executer-service:latest
        docker push $IMAGE_PREFIX/monitor-service:latest

    - uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    # 🚀 APPLY EVERYTHING (IMPORTANT)
    - name: Apply ALL manifests
      run: |
        kubectl apply -f k8s/ -n prod

    # 🔄 Wait for all deployments
    - name: Wait for deployments
      run: |
        kubectl rollout status deployment/web1-blue -n prod --timeout=120s || true
        kubectl rollout status deployment/web2-blue -n prod --timeout=120s || true
        kubectl rollout status deployment/sarathi -n prod --timeout=120s
        kubectl rollout status deployment/executer -n prod --timeout=120s
        kubectl rollout status deployment/monitor -n prod --timeout=120s

    # 🔵🟢 Switch to GREEN
    - name: Switch Traffic
      run: |
        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"green"}}}' || true
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"green"}}}' || true

    # 🔁 Rollback
    - name: Rollback
      if: failure()
      run: |
        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"blue"}}}' || true
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"blue"}}}' || true