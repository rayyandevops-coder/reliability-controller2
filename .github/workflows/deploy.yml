name: PRAVAH CI/CD (LATEST ONLY)

on:
  push:
    branches:
      - main

jobs:
  pravah:
    runs-on: ubuntu-latest

    steps:

    # ==============================
    # 🔹 CHECKOUT
    # ==============================
    - uses: actions/checkout@v5

    # ==============================
    # 🔹 DOCKER LOGIN
    # ==============================
    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # ==============================
    # 🔥 BUILD & PUSH (LATEST ONLY)
    # ==============================
    - name: Build & Push Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/monitor-service:latest ./monitor
        docker build -t ${{ secrets.DOCKER_USERNAME }}/executer-service:latest ./executer
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sarathi-service:latest ./sarathi
        docker build -t ${{ secrets.DOCKER_USERNAME }}/web1-service:latest ./web1
        docker build -t ${{ secrets.DOCKER_USERNAME }}/web2-service:latest ./web2

        docker push ${{ secrets.DOCKER_USERNAME }}/monitor-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/executer-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/sarathi-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/web1-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/web2-service:latest

    # ==============================
    # 🔹 KUBECTL SETUP
    # ==============================
    - uses: azure/setup-kubectl@v5

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

    # ==============================
    # 🔥 CREATE NAMESPACE
    # ==============================
    - name: Create Namespace
      run: |
        kubectl create namespace prod || true

    # ==============================
    # 🚀 DEPLOY EVERYTHING
    # ==============================
    - name: Deploy All
      run: |
        kubectl apply -f k8s/ -n prod

    # ==============================
    # 🔄 FORCE USE LATEST IMAGE
    # ==============================
    - name: Restart Deployments (Pull Latest)
      run: |
        kubectl rollout restart deployment -n prod

    # ==============================
    # ⏳ SOFT WAIT (NON-BLOCKING)
    # ==============================
    - name: Wait (Soft)
      run: sleep 30

    # ==============================
    # 🔍 VERIFY STATUS
    # ==============================
    - name: Check Status
      run: |
        kubectl get pods -n prod
        kubectl get svc -n prod

    # ==============================
    # 🔥 TEST PRAVAH
    # ==============================
    - name: Emit Test Signal
      run: |
        kubectl run test --image=curlimages/curl --restart=Never -- sleep 5
        kubectl wait --for=condition=Ready pod/test --timeout=60s

        kubectl exec test -- \
          curl -s -X POST http://monitor-service.prod.svc.cluster.local:5004/emit-signal \
          -H "Content-Type: application/json" \
          -d '{"trace_id":"latest-run","latency":850,"error_rate":0.6}'

        kubectl delete pod test

    # ==============================
    # 🔹 LOGS
    # ==============================
    - name: Monitor Logs
      run: |
        kubectl logs -n prod deploy/monitor | tail -n 20

    # ==============================
    # 🔹 FINAL OUTPUT
    # ==============================
    - name: Final Status
      run: |
        echo "Deployment using latest images completed successfully 🚀"