name: CI-CD Pipeline (Final Fixed)

on:
  push:
    branches:
      - main

env:
  IMAGE_PREFIX: rayyandevopss

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔥 Build latest images
    - name: Build & Push
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:latest ./web1
        docker build -t $IMAGE_PREFIX/web2-service:latest ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:latest ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:latest ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:latest ./monitor

        docker push $IMAGE_PREFIX/web1-service:latest
        docker push $IMAGE_PREFIX/web2-service:latest
        docker push $IMAGE_PREFIX/sarathi-service:latest
        docker push $IMAGE_PREFIX/executer-service:latest
        docker push $IMAGE_PREFIX/monitor-service:latest

    - uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    # ✅ APPLY SERVICES FIRST
    - name: Apply Services
      run: |
        kubectl apply -f k8s/web1-service.yml -n prod
        kubectl apply -f k8s/web2-service.yml -n prod

    # ✅ APPLY BASE DEPLOYMENTS
    - name: Apply Base
      run: |
        kubectl apply -f k8s/sarathi.yml -n prod
        kubectl apply -f k8s/executer.yml -n prod
        kubectl apply -f k8s/monitor.yml -n prod

    # 🔄 Rolling updates
    - name: Update Core Services
      run: |
        kubectl set image deployment/sarathi sarathi=$IMAGE_PREFIX/sarathi-service:latest -n prod
        kubectl set image deployment/executer executer=$IMAGE_PREFIX/executer-service:latest -n prod
        kubectl set image deployment/monitor monitor=$IMAGE_PREFIX/monitor-service:latest -n prod

    # 🔵🟢 Deploy GREEN
    - name: Deploy Green
      run: |
        kubectl apply -f k8s/web1-green.yml -n prod
        kubectl apply -f k8s/web2-green.yml -n prod

    # ✅ WAIT
    - name: Wait Green
      run: |
        kubectl rollout status deployment/web1-green -n prod --timeout=120s
        kubectl rollout status deployment/web2-green -n prod --timeout=120s

    # 🔄 SWITCH TRAFFIC
    - name: Switch Traffic
      run: |
        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"green"}}}'
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"green"}}}'

    # 🔁 ROLLBACK
    - name: Rollback
      if: failure()
      run: |
        kubectl patch svc web1-service -n prod -p '{"spec":{"selector":{"app":"web1","version":"blue"}}}'
        kubectl patch svc web2-service -n prod -p '{"spec":{"selector":{"app":"web2","version":"blue"}}}'