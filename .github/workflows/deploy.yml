name: CI-CD Pipeline (Zero Downtime)

on:
  push:
    branches:
      - main

env:
  IMAGE_PREFIX: rayyandevopss

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Images
      run: |
        docker build -t $IMAGE_PREFIX/web1-service:${{ github.sha }} ./web1
        docker build -t $IMAGE_PREFIX/web2-service:${{ github.sha }} ./web2
        docker build -t $IMAGE_PREFIX/sarathi-service:${{ github.sha }} ./sarathi
        docker build -t $IMAGE_PREFIX/executer-service:${{ github.sha }} ./executer
        docker build -t $IMAGE_PREFIX/monitor-service:${{ github.sha }} ./monitor

        docker push $IMAGE_PREFIX/web1-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/web2-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/sarathi-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/executer-service:${{ github.sha }}
        docker push $IMAGE_PREFIX/monitor-service:${{ github.sha }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure Kubernetes
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    - name: Apply Kubernetes Manifests
      run: |
        kubectl apply -f k8s/

    - name: Update Images
      run: |
        kubectl set image deployment/web1 web1=$IMAGE_PREFIX/web1-service:${{ github.sha }} -n prod
        kubectl set image deployment/web2 web2=$IMAGE_PREFIX/web2-service:${{ github.sha }} -n prod
        kubectl set image deployment/sarathi sarathi=$IMAGE_PREFIX/sarathi-service:${{ github.sha }} -n prod
        kubectl set image deployment/executer executer=$IMAGE_PREFIX/executer-service:${{ github.sha }} -n prod
        kubectl set image deployment/monitor monitor=$IMAGE_PREFIX/monitor-service:${{ github.sha }} -n prod

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/web1 -n prod --timeout=60s
        kubectl rollout status deployment/web2 -n prod --timeout=60s
        kubectl rollout status deployment/sarathi -n prod --timeout=60s
        kubectl rollout status deployment/executer -n prod --timeout=60s
        kubectl rollout status deployment/monitor -n prod --timeout=60s

    - name: Rollback on Failure
      if: failure()
      run: |
        kubectl rollout undo deployment/web1 -n prod
        kubectl rollout undo deployment/web2 -n prod
        kubectl rollout undo deployment/sarathi -n prod
        kubectl rollout undo deployment/executer -n prod
        kubectl rollout undo deployment/monitor -n prod