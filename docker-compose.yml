version: "3"

services:
  web1:
    build: ./web1
    container_name: web1
    ports:
      - "5001:5001"
    networks:
      monitor-network:
        aliases:
          - web1-service  

  web2:
    build: ./web2
    container_name: web2
    ports:
      - "5002:5002"
    networks:
      monitor-network:
        aliases:
          - web2-service  

  executer:
    build: ./executer
    container_name: executer
    ports:
      - "5003:5003"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      monitor-network:
        aliases:
          - executer-service   

  monitor:
    build: ./monitor
    container_name: monitor
    ports:
      - "5004:5004"
    depends_on:
      - web1
      - web2
      - executer
    networks:
      - monitor-network

networks:
  monitor-network:
    driver: bridge